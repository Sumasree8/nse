<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NSE — The Intelligence Layer for Founders. Where real-world problems become startups. A live, AI-powered view of the world's innovation pulse." />
  <meta name="theme-color" content="#0C0E13" />
  <title>NSE — The Intelligence Layer for Founders</title>

  <!-- Fonts: Space Grotesk (display) + Inter (body) + JetBrains Mono (data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Mission Control is dark-first. Apply theme class before paint to avoid flash. -->
  <script>
    (function() {
      var stored = localStorage.getItem('nse_theme');
      var theme = (stored === 'light' || stored === 'dark') ? stored : 'dark';
      document.documentElement.classList.add(theme);
      document.documentElement.style.backgroundColor = theme === 'light' ? '#EFEDE7' : '#0C0E13';
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
